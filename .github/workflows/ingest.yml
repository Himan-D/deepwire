name: Deepwire Pipeline

on:
  schedule:
    - cron: "0 */2 * * *"
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/lib/rss/sources.ts"
      - "workers/rss-ingestion.ts"

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Init SQLite DB
        run: npm run db:init

      - name: Run RSS ingestion
        run: npm run ingest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Check for changes
        id: git-check
        run: |
          git add -A
          git diff --staged --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated articles
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "deepwire-bot"
          git config user.email "bot@deepwire.ai"
          git commit -m "chore: :robot: auto-ingest RSS articles"
          git push

      - name: Build site
        run: npm run build

  crawl:
    needs: ingest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Crawl full article content
        run: npm run process

      - name: Commit crawled content
        run: |
          git add -A
          git diff --staged --quiet || (git config user.name "deepwire-bot" && git config user.email "bot@deepwire.ai" && git commit -m "chore: :robot: crawl full article content" && git push)

  analyze:
    needs: crawl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Clustering + Trends
        run: npm run cluster && npm run trends

      - name: GitHub Trending
        run: npm run github-trends

      - name: Hugging Face Models
        run: npm run hf-models

      - name: Knowledge Graph
        run: npm run knowledge-graph

      - name: Commit analysis
        run: |
          git add -A
          git diff --staged --quiet || (git config user.name "deepwire-bot" && git config user.email "bot@deepwire.ai" && git commit -m "chore: :robot: update analysis (clusters, trends, KG)" && git push)

  backfill:
    if: github.event.schedule == '0 6 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Init SQLite DB
        run: npm run db:init

      - name: Backfill historical articles
        run: npm run backfill

      - name: Commit backfilled articles
        run: |
          git add -A
          git diff --staged --quiet || (git config user.name "deepwire-bot" && git config user.email "bot@deepwire.ai" && git commit -m "chore: :robot: daily backfill" && git push)
